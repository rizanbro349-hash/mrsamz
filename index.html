<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr Samz - Live TV</title>
    <!-- Clappr Player এবং HLS সাপোর্ট স্ক্রিপ্ট -->
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@clappr/hlsjs-playback@latest/dist/hlsjs-playback.min.js"></script>
    <style>
        body { 
            background-color: #111; 
            color: white; 
            font-family: Arial, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
        }
        h1 { color: #ff3e3e; margin-bottom: 5px; }
        .sub-title { color: #aaa; font-size: 14px; margin-bottom: 20px; }
        .player-container { 
            max-width: 800px; 
            margin: 20px auto; 
            border: 2px solid #333; 
            background: #000; 
            border-radius: 8px;
            overflow: hidden;
        }
        .btn-container { margin-top: 20px; }
        .channel-btn { 
            background: #222; 
            color: #fff; 
            border: 1px solid #444; 
            padding: 12px 24px; 
            margin: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            border-radius: 5px; 
            font-weight: bold;
            transition: 0.3s;
        }
        .channel-btn:hover { background: #ff3e3e; border-color: #ff3e3e; }
    </style>
</head>
<body>

    <h1>Mr Samz Live TV Portal</h1>
    <div class="sub-title">নিচের বাটনে ক্লিক করে চ্যানেল প্লে করুন</div>

    <div class="player-container">
        <div id="player"></div>
    </div>

    <div class="btn-container">
        <!-- সরাসরি প্লে হওয়ার মতো একটি লাইভ স্ট্রিম এবং ক্যাটাগরি -->
        <button class="channel-btn" onclick="changeChannel('https://bppltv.dotstream.tv/direct/tsports-hd/index.m3u8')">⚽ T Sports Live</button>
        <button class="channel-btn" onclick="changeChannel('https://raw.githubusercontent.com/imShakil/tvlink/refs/heads/main/iptv.m3u8')">🇧🇩 সব বাংলা চ্যানেল</button>
    </div>

    <script>
        // প্লেয়ার সেটআপ করা হচ্ছে ব্রাউজার সাপোর্টের জন্য
        var player = new Clappr.Player({
            source: "https://bppltv.dotstream.tv/direct/tsports-hd/index.m3u8",
            parentId: "#player",
            plugins: [HlsjsPlayback],
            mimeType: "application/x-mpegURL",
            width: "100%",
            height: "400px",
            autoPlay: true,
            mute: false
        });

        function changeChannel(url) {
            player.load(url);
            player.play();
        }
    </script>

</body>
</html>
