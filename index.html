<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr Samz - Live TV</title>
    <!-- Clappr Player Script -->
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <style>
        body { 
            background-color: #111; 
            color: white; 
            font-family: Arial, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
        }
        h1 { color: #ff3e3e; margin-bottom: 5px; }
        .sub-title { color: #aaa; font-size: 14px; margin-bottom: 20px; }
        .player-container { 
            max-width: 800px; 
            margin: 20px auto; 
            border: 2px solid #333; 
            background: #000; 
            border-radius: 8px;
            overflow: hidden;
        }
        .btn-container { margin-top: 20px; }
        .channel-btn { 
            background: #222; 
            color: #fff; 
            border: 1px solid #444; 
            padding: 12px 24px; 
            margin: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            border-radius: 5px; 
            font-weight: bold;
            transition: 0.3s;
        }
        .channel-btn:hover { background: #ff3e3e; border-color: #ff3e3e; }
    </style>
</head>
<body>

    <h1>Mr Samz Live TV Portal</h1>
    <div class="sub-title">নিচের বাটনে ক্লিক করে চ্যানেল প্লে করুন</div>

    <!-- ভিডিও প্লেয়ার এরিয়া -->
    <div class="player-container">
        <div id="player"></div>
    </div>

    <!-- কাজের জন্য সচল আইপিটিভি বাটনসমূহ -->
    <div class="btn-container">
        <button class="channel-btn" onclick="changeChannel('https://iptv-org.github.io/iptv/countries/bd.m3u')">🇧🇩 সব বাংলা চ্যানেল</button>
        <button class="channel-btn" onclick="changeChannel('https://iptv-org.github.io/iptv/categories/sports.m3u')">⚽ স্পোর্টস (খেলাধুলার চ্যানেল)</button>
    </div>

    <script>
        // পেজ ওপেন হলেই প্রথম চ্যানেল লিস্টটি লোড হবে
        var player = new Clappr.Player({
            source: "https://iptv-org.github.io/iptv/countries/bd.m3u",
            parentId: "#player",
            width: "100%",
            height: "400px",
            autoPlay: true,
            mute: false
        });

        // বাটন টিপলে চ্যানেল বদলানোর ফাংশন
        function changeChannel(url) {
            player.load(url);
            player.play();
        }
    </script>

</body>
</html>
